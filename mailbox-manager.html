<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经纪人邮箱</title>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f3f6fb;
      color: #203048;
    }
    .header {
      background: linear-gradient(90deg, #2c3e50, #314b66);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 6px 18px rgba(22, 40, 66, 0.2);
    }
    .header-title { font-size: 20px; font-weight: 700; }
    .mailbox-id {
      margin: 0;
      font-size: 12px;
      color: #d4e2f4;
      font-weight: 600;
    }
    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .container {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      background: #ecf2fa;
      padding: 10px 8px;
      border-right: 1px solid #dce6f2;
    }
    .sidebar .folder-item {
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: #3d4f69;
      margin-bottom: 6px;
    }
    .sidebar .folder-item.active { background: #dde9fb; color: #2a4370; }
    .mail-list { padding: 22px 24px; }
    .mail-item {
      background: white;
      padding: 16px 18px;
      margin-bottom: 10px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #dce4f0;
      box-shadow: 0 4px 12px rgba(41, 69, 106, 0.08);
    }
    .mail-from { margin: 0 0 6px; font-size: 13px; color: #516580; }
    .mail-subject { margin: 0 0 6px; font-size: 15px; font-weight: 700; color: #2a4066; }
    .mail-time { margin: 0; font-size: 12px; color: #7b8ca5; }
    .empty { margin: 0; font-size: 13px; color: #7b8ca5; }
    .mail-detail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .mail-detail-content {
      background: white;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: auto;
      border-radius: 12px;
      padding: 24px;
      line-height: 1.7;
      color: #2c3e50;
    }
    .mail-detail-content h2 { margin: 0 0 12px; font-size: 24px; }
    .mail-detail-content p { margin: 0 0 12px; }
    .close-btn {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }
    .attachments-block {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e8eef5;
    }
    .attachments-label {
      margin: 0 0 8px;
      font-size: 12px;
      color: #73839c;
      font-weight: 600;
    }
    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid #dde4ee;
      border-radius: 8px;
      background: #f9fafb;
      color: #2c3e50;
      font-size: 13px;
    }
    .attachment-chip .file-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #b71c1c;
      padding: 3px 5px;
      border: 1px solid rgba(183, 28, 28, 0.35);
      border-radius: 3px;
      background: #fff;
    }
    .attachment-chip .fname {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">经纪人邮箱</div>
      <p class="mailbox-id">constell.manager@stargalaxy-ent.com</p>
    </div>
    <button class="logout-btn" type="button" onclick="logoutMailbox()">登出</button>
  </div>

  <div class="container">
    <div class="sidebar">
      <div class="folder-item active" data-folder="inbox">📥 收件箱</div>
      <div class="folder-item" data-folder="sent">📤 已发送</div>
      <div class="folder-item" data-folder="trash">🗑 垃圾箱</div>
    </div>
    <div class="mail-list" id="mailList"></div>
  </div>

  <div class="mail-detail" id="mailDetail">
    <div class="mail-detail-content">
      <h2 id="detailSubject">邮件标题</h2>
      <p id="detailFrom"></p>
      <p id="detailDate"></p>
      <div id="detailBody"></div>
      <button class="close-btn" onclick="closeMailDetail()">关闭</button>
    </div>
  </div>

  <script>
    function escHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    (function initManagerMail() {
      var listEl = document.getElementById("mailList");
      var folderItems = document.querySelectorAll(".folder-item");
      var mails = [
        {
          from: "站内通知",
          date: "",
          subject: "【进度提示】你已体验到当前版本的全部内容",
          body: [
            "感谢你的游玩。",
            "",
            "你已体验到本作在当前版本中开放的全部内容。",
            "",
            "你可以返回站内其他页面重新梳理线索，也许会有新的发现。",
            "",
            "后续内容将在后续更新中逐步开放，敬请期待。"
          ]
        },
        {
          from: "Eric Qi <eric.qi@stargalaxy-ent.com>",
          date: "今天 09:40",
          subject: "？？？？？？？？？",
          body: [
            "你现在在哪里？",
            "",
            "CONSTELL的人现在在哪？",
            "",
            "你提交的所谓“四城同步出现”的预热活动，今天一个人都没有到场。",
            "所有城市全部空场，现场人员已经在问责。",
            "",
            "你带着他们四个去了哪里？",
            "",
            "这是你所谓的宣传计划？",
            "",
            "现在外面已经在传“集体失踪”，你有没有意识到这件事情的严重性？",
            "",
            "马上给我一个解释。",
            "",
            "如果这件事和你有关，我需要你立刻回复我。"
          ]
        },
        {
          from: "starnet-security@stargalaxy-ent.com",
          date: "3 天前",
          subject: "账号安全提醒：检测到异常登录尝试",
          body: [
            "系统检测到你的邮箱账号在异地设备发生多次登录尝试。",
            "建议尽快更新密码并启用二次验证。"
          ]
        }
      ];

      var sentMails = [
        {
          isOutgoing: true,
          recipient: "Eric Qi <eric.qi@stargalaxy-ent.com>",
          subject: "【项目提案】CONSTELL五周年巡演预热传播方案",
          body: [
            "Eric，您好：",
            "",
            "关于CONSTELL五周年巡演《归辰》整体宣传节奏，我这边整理了一版阶段性预热方案，供您审核。",
            "",
            "考虑到目前常规营业模式（物料发布、社交互动）已趋于同质化，本次计划尝试进行一次“反向曝光”的造势方式：",
            "",
            "在演唱会预热期内，成员将统一进入短期“低曝光状态”，暂停日常营业与内容更新，以制造信息真空与外部关注度积累。",
            "",
            "随后在节点时间，通过“四城同步出现”的形式进行集中释放，使讨论在短时间内达到峰值，从而形成更具冲击力的传播效果。",
            "",
            "该方式的核心在于通过“缺席”强化“出现”的关注度，同时结合线下目击与社交平台发酵，形成自发传播链路。",
            "",
            "具体执行细节及时间安排已整理至附件企划书中，如无问题，我这边会继续推进后续落地。",
            "",
            "辛苦您抽空看一下，有需要调整的地方我可以再补充。",
            "",
            "顺祝工作顺利。"
          ],
          fakeAttachment: "《CONSTELL五周年巡演预热传播方案》.pdf"
        }
      ];

      var folders = { inbox: mails, sent: sentMails, trash: [] };

      function render(folder) {
        var arr = folders[folder] || [];
        listEl.innerHTML = "";
        if (!arr.length) {
          listEl.innerHTML = '<p class="empty">当前文件夹暂无邮件。</p>';
          return;
        }
        arr.forEach(function (item) {
          var card = document.createElement("div");
          card.className = "mail-item";
          var metaLine = item.isOutgoing
            ? "发送给：" + escHtml(item.recipient)
            : "来自：" + escHtml(item.from);
          var timeHtml =
            item.isOutgoing || !item.date ? "" : '<p class="mail-time">' + escHtml(item.date) + "</p>";
          card.innerHTML =
            '<p class="mail-from">' + metaLine + "</p>" +
            '<p class="mail-subject">主题：' + escHtml(item.subject) + "</p>" +
            timeHtml;
          card.addEventListener("click", function () { openMailDetail(item); });
          listEl.appendChild(card);
        });
      }

      folderItems.forEach(function (el) {
        el.addEventListener("click", function () {
          folderItems.forEach(function (n) { n.classList.remove("active"); });
          el.classList.add("active");
          render(el.dataset.folder);
        });
      });

      render("inbox");
    })();

    function openMailDetail(mail) {
      document.getElementById("detailSubject").textContent = mail.subject;
      var fromEl = document.getElementById("detailFrom");
      var dateEl = document.getElementById("detailDate");
      if (mail.isOutgoing) {
        fromEl.textContent = "发送给：" + mail.recipient;
        dateEl.textContent = "";
        dateEl.style.display = "none";
      } else {
        fromEl.textContent = "来自：" + mail.from;
        if (mail.date) {
          dateEl.style.display = "";
          dateEl.textContent = "时间：" + mail.date;
        } else {
          dateEl.textContent = "";
          dateEl.style.display = "none";
        }
      }
      var paras = (mail.body || []).map(function (line) {
        return "<p>" + escHtml(line) + "</p>";
      });
      var attachHtml = "";
      if (mail.fakeAttachment) {
        attachHtml =
          '<div class="attachments-block">' +
          '<p class="attachments-label">附件</p>' +
          '<div class="attachment-chip">' +
          '<span class="file-badge" aria-hidden="true">PDF</span>' +
          '<p class="fname">' +
          escHtml(mail.fakeAttachment) +
          "</p></div></div>";
      }
      document.getElementById("detailBody").innerHTML = paras.join("") + attachHtml;
      document.getElementById("mailDetail").style.display = "flex";
    }

    function closeMailDetail() {
      document.getElementById("mailDetail").style.display = "none";
    }

    function logoutMailbox() {
      try { sessionStorage.removeItem("mailbox_login_user"); } catch (e) {}
      window.location.href = "./mailbox-login.html";
    }
  </script>
</body>
</html>
