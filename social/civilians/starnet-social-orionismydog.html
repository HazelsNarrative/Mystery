<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@orionismydog | StarNet</title>
  <style>
    :root { --bg:#f8f9fb; --card:#fff; --line:#e6ecf5; --text:#0f1419; --sub:#536471; --brand:#6f77ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { width:min(900px,94vw); margin:0 auto; padding:20px 0 30px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 10px 24px rgba(63,77,110,0.08); }
    .site-head { padding:12px 16px; border-bottom:1px solid var(--line); font-size:13px; color:var(--sub); display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .brand-logo { width:100px; height:auto; display:block; transform: scale(1.62); transform-origin: left center; margin-left: -10px; }
    .url { margin:0; font-size:12px; color:var(--sub); word-break:break-all; }
    .cover { height:200px; position:relative; background-image:linear-gradient(120deg, rgba(90,114,150,0.78), rgba(66,83,116,0.76) 45%, rgba(38,50,71,0.8)), url("../../assets/starnet-home-bg.png"); background-size:cover; background-position:center; }
    .avatar { position:absolute; left:18px; bottom:-34px; width:84px; height:84px; border-radius:50%; border:4px solid #fff; box-shadow:0 8px 18px rgba(28,45,72,.25); display:grid; place-items:center; font-weight:800; color:#223756; background:radial-gradient(circle at 30% 30%,#fff,#bdd2eb 45%,#738eb2); }
    .profile { padding:46px 18px 14px; border-bottom:1px solid var(--line); }
    .name { margin:0; font-size:22px; font-weight:800; }
    .id { margin:4px 0 10px; color:var(--sub); font-size:13px; }
    .bio { margin:0; line-height:1.7; color:#243046; font-size:14px; }
    .stats { margin-top:10px; display:flex; gap:16px; font-size:12px; color:var(--sub); }
    .stats strong { color:#263a61; }
    .feed-title { margin:0; padding:12px 18px; font-size:15px; font-weight:800; border-bottom:1px solid var(--line); color:#22345a; }
    .post { padding:14px 18px; border-bottom:1px solid var(--line); }
    .post:last-child { border-bottom:none; }
    .post-head { font-size:13px; color:var(--sub); margin-bottom:6px; }
    .post p { margin:0; font-size:14px; line-height:1.75; color:#1d2432; }
    .post-stats { margin-top:8px; font-size:12px; color:#6f7f94; display:flex; gap:14px; }
    .tag { color:var(--brand); }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="site-head">
        <img class="brand-logo" src="../../assets/starnet-logo.png" alt="StarNet logo">
        <p class="url">https://starnet.social/orionismydog</p>
      </div>
      <div class="cover"><div class="avatar">O</div></div>
      <div class="profile">
        <h2 class="name">欧日昂世狗一</h2>
        <p class="id">@orionismydog</p>
        <p class="bio">别装路人，懂得都懂。</p>
        <div class="stats"><span><strong>64</strong> 关注</span><span><strong>742</strong> 粉丝</span><span><strong>58</strong> 动态</span></div>
      </div>
      <h3 class="feed-title">公开动态</h3>
      <article class="post"><div class="post-head">orionismydog · 2 小时前</div><p>今天这张后台图谁看懂了？这时间点根本对不上。</p><div class="post-stats"><span>转发 7</span><span>赞 83</span><span>评论 5</span></div></article>
      <article class="post"><div class="post-head">orionismydog · 3 天前</div><p>又删帖了，看来是真的急了。<span class="tag">#记录</span></p><div class="post-stats"><span>转发 4</span><span>赞 56</span><span>评论 3</span></div></article>
    </section>
  </main>
</body>
</html>
