<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@rasalmylady | StarNet</title>
  <style>
    :root { --bg:#f8f9fb; --card:#fff; --line:#e6ecf5; --text:#0f1419; --sub:#536471; --brand:#6f77ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { width:min(900px,94vw); margin:0 auto; padding:20px 0 30px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 10px 24px rgba(63,77,110,0.08); }
    .site-head { padding:12px 16px; border-bottom:1px solid var(--line); font-size:13px; color:var(--sub); display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .brand-logo { width:100px; height:auto; display:block; transform: scale(1.62); transform-origin: left center; margin-left: -10px; }
    .url { margin:0; font-size:12px; color:var(--sub); word-break:break-all; }
    .cover { height:200px; position:relative; background-image:linear-gradient(120deg, rgba(121,87,166,0.78), rgba(93,70,131,0.76) 45%, rgba(57,42,83,0.8)), url("../../assets/starnet-home-bg.png"); background-size:cover; background-position:center; }
    .avatar { position:absolute; left:18px; bottom:-34px; width:84px; height:84px; border-radius:50%; border:4px solid #fff; box-shadow:0 8px 18px rgba(64,44,93,.25); display:grid; place-items:center; font-weight:800; color:#3f2a61; background:radial-gradient(circle at 30% 30%,#fff,#ddcef1 45%,#997ebf); }
    .profile { padding:46px 18px 14px; border-bottom:1px solid var(--line); }
    .name { margin:0; font-size:22px; font-weight:800; }
    .id { margin:4px 0 10px; color:var(--sub); font-size:13px; }
    .bio { margin:0; line-height:1.7; color:#243046; font-size:14px; }
    .stats { margin-top:10px; display:flex; gap:16px; font-size:12px; color:var(--sub); }
    .stats strong { color:#263a61; }
    .feed-title { margin:0; padding:12px 18px; font-size:15px; font-weight:800; border-bottom:1px solid var(--line); color:#22345a; }
    .post { padding:14px 18px; border-bottom:1px solid var(--line); }
    .post:last-child { border-bottom:none; }
    .post-head { font-size:13px; color:var(--sub); margin-bottom:6px; }
    .post p { margin:0; font-size:14px; line-height:1.75; color:#1d2432; }
    .post-stats { margin-top:8px; font-size:12px; color:#6f7f94; display:flex; gap:14px; }
    .tag { color:var(--brand); }
    .private-note { margin:10px 0 0; font-size:13px; color:#8a5a74; font-weight:700; }
    .follow-btn { margin-top:10px; border:none; border-radius:999px; padding:8px 14px; font-size:12px; font-weight:700; color:#fff; background:linear-gradient(90deg,#8a6dff,#4f81df); cursor:pointer; }
    .locked-tip { margin:12px 18px 14px; padding:10px 12px; border:1px solid #e2d6ff; border-radius:12px; background:#faf7ff; color:#6a5f8a; font-size:12px; line-height:1.7; }
    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(20,24,40,.45); z-index:200; }
    .modal.show { display:flex; }
    .modal-card { width:min(360px,92vw); background:#fff; border-radius:14px; border:1px solid #e1e8f4; padding:16px; }
    .modal-title { margin:0 0 8px; font-size:15px; color:#2c3f63; font-weight:800; }
    .modal-question { margin:0 0 10px; font-size:13px; color:#5f6f89; }
    .modal-input { width:100%; border:1px solid #d6dfef; border-radius:10px; padding:9px 10px; font-size:13px; margin-bottom:8px; }
    .modal-error { min-height:1.2em; margin:0 0 8px; font-size:12px; color:#d44c72; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; }
    .modal-actions button { border:none; border-radius:999px; padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; }
    .btn-cancel { background:#eef2fb; color:#5f6f89; }
    .btn-ok { background:linear-gradient(90deg,#8a6dff,#4f81df); color:#fff; }
  </style>
</head>
<body>
  <main class="app"><section class="panel">
    <div class="site-head"><img class="brand-logo" src="../../assets/starnet-logo.png" alt="StarNet logo"><p class="url">https://starnet.social/rasalmylady</p></div><div class="cover"><div class="avatar">V</div></div>
    <div class="profile"><h2 class="name">我女拉塞尔</h2><p class="id">@rasalmylady</p><p class="bio">想说些漂亮话哄你，可是想来想去最漂亮的也只有你了。</p><p class="private-note">🔒 非公开账户，关注并通过验证后可查看内容</p><button class="follow-btn" id="followBtn">关注</button><div class="stats"><span><strong>101</strong> 关注</span><span><strong>1,034</strong> 粉丝</span><span><strong>74</strong> 动态</span></div></div>
    <p class="locked-tip" id="lockedTip">该账号已开启隐私保护，当前内容不可见。</p>
    <div id="protectedContent" hidden>
      <h3 class="feed-title">公开动态</h3>
      <article class="post"><div class="post-head">rasalmylady · 刚刚</div><p>又有人说我造谣？那你解释一下这份行程截图哪里错了。</p><div class="post-stats"><span>转发 9</span><span>赞 118</span><span>评论 7</span></div></article>
      <article class="post"><div class="post-head">rasalmylady · 2 天前</div><p>粉圈捂嘴速度真的一流，评论区全在控评。<span class="tag">#别装路人</span></p><div class="post-stats"><span>转发 6</span><span>赞 89</span><span>评论 4</span></div></article>
    </div>
  </section></main>
  <div class="modal" id="followModal"><div class="modal-card"><p class="modal-title">关注验证</p><p class="modal-question">问题</p><input class="modal-input" id="answerInput" type="text" placeholder="请输入答案"><p class="modal-error" id="answerError"></p><div class="modal-actions"><button class="btn-cancel" type="button" id="btnCancel">取消</button><button class="btn-ok" type="button" id="btnSubmit">提交</button></div></div></div>
  <script>
    (function () {
      var followBtn = document.getElementById("followBtn");
      var followModal = document.getElementById("followModal");
      var answerInput = document.getElementById("answerInput");
      var answerError = document.getElementById("answerError");
      var btnCancel = document.getElementById("btnCancel");
      var btnSubmit = document.getElementById("btnSubmit");
      var protectedContent = document.getElementById("protectedContent");
      var lockedTip = document.getElementById("lockedTip");
      var expected = "答案";
      function closeModal() { followModal.classList.remove("show"); answerInput.value = ""; answerError.textContent = ""; }
      followBtn.addEventListener("click", function () { followModal.classList.add("show"); answerInput.focus(); });
      btnCancel.addEventListener("click", closeModal);
      btnSubmit.addEventListener("click", function () {
        if (String(answerInput.value || "").trim() !== expected) { answerError.textContent = "答案错误，请重试。"; return; }
        closeModal(); followBtn.hidden = true; lockedTip.hidden = true; protectedContent.hidden = false;
      });
      followModal.addEventListener("click", function (e) { if (e.target === followModal) closeModal(); });
    })();
  </script>
</body>
</html>
