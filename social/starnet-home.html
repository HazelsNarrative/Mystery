<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarNet | 搜索</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --card: #ffffff;
      --line: #e5e9f2;
      --text: #1f2a3a;
      --sub: #73839c;
      --brand: #6f77ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image: url("../assets/starnet-home-bg.png");
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }
    .app {
      width: min(980px, 94vw);
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      overflow: hidden;
    }
    .search-page {
      width: min(900px, 94vw);
      padding: 42px 24px 26px;
      text-align: center;
    }
    .logo-wrap { margin-bottom: 18px; }
    .logo {
      width: min(420px, 72vw);
      max-width: 100%;
      height: auto;
      display: inline-block;
      border-radius: 10px;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e4e9f3;
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      box-shadow: 0 8px 16px rgba(90, 105, 138, 0.08);
      width: min(700px, 92%);
      margin: 0 auto;
    }
    .search-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      color: #203049;
      outline: none;
      min-width: 0;
    }
    .search-wrap button {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      background: linear-gradient(90deg, #8a92ff, #7f83ff);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .search-tip {
      margin: 10px auto 0;
      width: min(700px, 92%);
      text-align: left;
      font-size: 12px;
      color: #6d7f98;
    }
    .results-wrap {
      text-align: left;
      width: min(760px, 92%);
      margin: 18px auto 0;
      min-height: 120px;
    }
    .section-title { margin: 2px 0 10px; font-size: 13px; color: #5d6f87; font-weight: 700; }
    .card-link {
      display: flex;
      gap: 10px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .card-link:hover { border-color: #cdd8ff; background: #fbfcff; }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
      font-size: 18px;
      flex-shrink: 0;
    }
    .name { margin: 0 0 2px; font-size: 14px; font-weight: 800; color: #1b2940; }
    .id, .bio { margin: 0; font-size: 12px; color: #607188; }
    .news-card {
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .post-card {
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .post-head { margin: 0 0 6px; font-size: 13px; color: #5e6f87; }
    .post-head strong { color: #21395d; }
    .post-body { margin: 0; font-size: 13px; line-height: 1.7; color: #33465f; white-space: pre-line; }
    .repost-card {
      margin-top: 8px;
      border: 1px solid #d7e0ee;
      border-radius: 12px;
      background: #f9fbff;
      padding: 10px;
    }
    .repost-head { margin: 0 0 6px; font-size: 12px; color: #607087; }
    .post-image {
      margin: 8px auto 0;
      width: auto;
      height: auto;
      max-width: min(280px, 100%);
      max-height: 280px;
      border: 1px solid #d4ddee;
      border-radius: 12px;
      display: block;
      cursor: zoom-in;
    }
    .image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(12, 16, 28, 0.82);
      z-index: 260;
      padding: 24px;
    }
    .image-lightbox.show { display: flex; }
    .image-lightbox img {
      max-width: min(1100px, 92vw);
      max-height: 88vh;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 20px 45px rgba(0,0,0,.45);
      background: #111827;
    }
    .news-title { margin: 0 0 6px; font-size: 14px; color: #21395d; font-weight: 800; }
    .news-body { margin: 0; font-size: 13px; line-height: 1.7; color: #33465f; }
    .empty { margin: 0; font-size: 13px; color: #74859a; padding-top: 6px; }
    @media (max-width: 720px) {
      .search-page { padding: 30px 14px 18px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel search-page">
      <div class="logo-wrap">
        <img class="logo" src="../assets/starnet-logo.png" alt="StarNet logo">
      </div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="搜索用户或关键词" autocomplete="off">
        <button id="searchBtn" type="button">搜索</button>
      </div>
      <p class="search-tip">艺人新闻请使用“名字 + 关键词”进行搜索，例如：CONSTELL 演唱会。</p>
      <section class="results-wrap" id="results"></section>
    </section>
  </main>
  <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
    <img id="lightboxImage" alt="查看大图">
  </div>

  <script>
    (function () {
      var users = [
        { name: "Orion", id: "@CONSTELL-Orion", bio: "CONSTELL成员", href: "./artists/starnet-social-orion.html", avatar: "O", color: "linear-gradient(135deg,#65b6ff,#6d79ff)" },
        { name: "Rasal", id: "@CONSTELL-Rasal", bio: "CONSTELL成员", href: "./artists/starnet-social-rasal.html", avatar: "V", color: "linear-gradient(135deg,#9a8bff,#7ac1ff)" },
        { name: "Altair", id: "@CONSTELL-Altair", bio: "CONSTELL成员", href: "./artists/starnet-social-altair.html", avatar: "A", color: "linear-gradient(135deg,#72d4ff,#5b8eff)" },
        { name: "Regulus", id: "@CONSTELL-Regulus", bio: "CONSTELL成员", href: "./artists/starnet-social-regulus.html", avatar: "R", color: "linear-gradient(135deg,#ffbe75,#ff8c65)" }
      ];

      var news = [
        {
          keys: ["归辰", "五周年"],
          title: "【官方动态】《归辰》演唱会筹备进入最终阶段",
          body: "据站内同步信息，CONSTELL 五周年纪念演唱会《归辰》进入最终联排阶段。舞台视觉与曲目编排将分批释出。"
        }
      ];
      var posts = [
        {
          keys: ["风萧萧", "fxx"],
          id: "@风萧萧兮",
          body: "最近有人私信问我有没有合集，就简单列一下最近写的RO（Regulus × Orion），都在StarNet上，感兴趣可以自己翻一下。\n\n基本都是随手写的，篇幅不太固定，也没怎么修，轻拍🙏\n📄《禁区》｜短篇｜约1.8w\n📄《夜行偏差》｜短篇｜约3w\n📄《RE：O 从零开始的寰宇猎手生活》｜长篇｜23.5w\n📄《恒星失序》｜短篇｜约9k\n📄《界外》｜一发完｜约5k"
        },
        {
          keys: ["constell 演唱会", "CONSTELL 演唱会", "constell", "演唱会", "xiaojiang_tai", "我们八月见"],
          id: "@CONSTELL-Official",
          body: "我们八月见。",
          postImage: "../assets/concert-poster.png"
        },
        {
          keys: ["altair 夜店"],
          matchMode: "exact",
          id: "@Altair520",
          body: "澄清！！！网传“Altair 夜店包厢图”均为不实信息，相关夜店内图片系拼接合成。另有传言称物料里出现某品牌威士忌、电子烟，也与事实不符：画面中出现的是海外品牌的护嗓药物，所谓“电子烟”实为唇膏。请勿继续传播失实内容。"
        },
        {
          keys: ["altair 夜店"],
          matchMode: "exact",
          id: "@独家星闻",
          body: "劲爆！当红男团人气成员 Altair 被曝深夜流连夜店，更有粉丝翻出其在官方物料中疑似出现抽烟、饮酒画面，相关争议持续发酵中……更多内容请见>>>"
        }
      ];

      function norm(s) {
        return String(s || "").trim().toLowerCase();
      }

      function normIdLike(s) {
        return norm(s).replace(/^@+/, "").replace(/\s+/g, "");
      }

      function setupImageZoom() {
        var lightbox = document.getElementById("imageLightbox");
        var lightboxImage = document.getElementById("lightboxImage");
        var list = document.getElementById("results");
        if (!lightbox || !lightboxImage || !list) return;
        list.addEventListener("click", function (e) {
          var img = e.target && e.target.closest("img.post-image");
          if (!img) return;
          lightboxImage.src = img.currentSrc || img.src;
          lightboxImage.alt = img.alt || "查看大图";
          lightbox.classList.add("show");
          lightbox.setAttribute("aria-hidden", "false");
        });
        lightbox.addEventListener("click", function (e) {
          if (e.target !== lightbox && e.target !== lightboxImage) return;
          lightbox.classList.remove("show");
          lightboxImage.removeAttribute("src");
          lightbox.setAttribute("aria-hidden", "true");
        });
      }

      function render(query) {
        var list = document.getElementById("results");
        var q = norm(query);
        var qId = normIdLike(query);
        var userMatched = users.filter(function (u) {
          var n = norm(u.name);
          var id = normIdLike(u.id);
          return q && (n.indexOf(q) !== -1 || id.indexOf(qId) !== -1);
        });
        var newsMatched = news.filter(function (n) {
          return q && n.keys.some(function (k) { return norm(k).indexOf(q) !== -1 || q.indexOf(norm(k)) !== -1; });
        });
        var postsMatched = posts.filter(function (p) {
          if (p.matchMode === "exact") {
            return q && p.keys.some(function (k) { return norm(k) === q; });
          }
          return q && p.keys.some(function (k) { return norm(k).indexOf(q) !== -1 || q.indexOf(norm(k)) !== -1; });
        });

        var html = "";
        if (userMatched.length) {
          html += '<h2 class="section-title">用户</h2>';
          userMatched.forEach(function (u) {
            html += '<a class="card-link" href="' + u.href + '">';
            html += '<span class="avatar" style="background:' + u.color + '">' + u.avatar + "</span>";
            html += '<span><p class="name">' + u.name + '</p><p class="id">' + u.id + '</p><p class="bio">' + u.bio + "</p></span>";
            html += "</a>";
          });
        }
        if (newsMatched.length) {
          html += '<h2 class="section-title">新闻内容</h2>';
          newsMatched.forEach(function (n) {
            html += '<article class="news-card"><h3 class="news-title">' + n.title + '</h3><p class="news-body">' + n.body + "</p></article>";
          });
        }
        if (postsMatched.length) {
          html += '<h2 class="section-title">动态</h2>';
          postsMatched.forEach(function (p) {
            html += '<article class="post-card"><p class="post-head"><strong>' + p.id + '</strong> · 动态</p>';
            html += '<p class="post-body">' + p.body + "</p>";
            if (p.postImage) {
              html += '<img class="post-image" src="' + p.postImage + '" alt="动态配图">';
            }
            html += "</article>";
          });
        }
        if (q && !html) {
          html = '<p class="empty">未搜索到相关内容，请尝试成员名、ID或关键词。</p>';
        }
        list.innerHTML = html;
      }

      document.getElementById("searchBtn").addEventListener("click", function () {
        render(document.getElementById("searchInput").value);
      });
      document.getElementById("searchInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          render(e.target.value);
        }
      });

      setupImageZoom();
      render("");
    })();
  </script>
</body>
</html>
