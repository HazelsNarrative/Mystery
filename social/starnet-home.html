<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarNet | 搜索</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --card: #ffffff;
      --line: #e5e9f2;
      --text: #1f2a3a;
      --sub: #73839c;
      --brand: #6f77ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image: url("../assets/starnet-home-bg.png");
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }
    .app {
      width: min(980px, 94vw);
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      overflow: hidden;
    }
    .search-page {
      width: min(900px, 94vw);
      padding: 42px 24px 26px;
      text-align: center;
    }
    .logo-wrap { margin-bottom: 18px; }
    .logo {
      width: min(420px, 72vw);
      max-width: 100%;
      height: auto;
      display: inline-block;
      border-radius: 10px;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e4e9f3;
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      box-shadow: 0 8px 16px rgba(90, 105, 138, 0.08);
      width: min(700px, 92%);
      margin: 0 auto;
    }
    .search-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      color: #203049;
      outline: none;
      min-width: 0;
    }
    .search-wrap button {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      background: linear-gradient(90deg, #8a92ff, #7f83ff);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .search-tip {
      margin: 10px auto 0;
      width: min(700px, 92%);
      text-align: left;
      font-size: 12px;
      color: #6d7f98;
    }
    .results-wrap {
      text-align: left;
      width: min(760px, 92%);
      margin: 18px auto 0;
      min-height: 120px;
    }
    .section-title { margin: 2px 0 10px; font-size: 13px; color: #5d6f87; font-weight: 700; }
    .card-link {
      display: flex;
      gap: 10px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .card-link:hover { border-color: #cdd8ff; background: #fbfcff; }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
      font-size: 18px;
      flex-shrink: 0;
    }
    .name { margin: 0 0 2px; font-size: 14px; font-weight: 800; color: #1b2940; }
    .id, .bio { margin: 0; font-size: 12px; color: #607188; }
    .news-card {
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .post-card {
      border: 1px solid #e6ebf6;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .post-head { margin: 0 0 6px; font-size: 13px; color: #5e6f87; }
    .post-head strong { color: #21395d; }
    .post-body { margin: 0; font-size: 13px; line-height: 1.7; color: #33465f; white-space: pre-line; }
    .repost-card {
      margin-top: 8px;
      border: 1px solid #d7e0ee;
      border-radius: 12px;
      background: #f9fbff;
      padding: 10px;
    }
    .repost-head { margin: 0 0 6px; font-size: 12px; color: #607087; }
    .post-image {
      margin: 8px auto 0;
      width: auto;
      height: auto;
      max-width: min(280px, 100%);
      max-height: 280px;
      border: 1px solid #d4ddee;
      border-radius: 12px;
      display: block;
      cursor: zoom-in;
    }
    .image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(12, 16, 28, 0.82);
      z-index: 260;
      padding: 24px;
    }
    .image-lightbox.show { display: flex; }
    .image-lightbox img {
      max-width: min(1100px, 92vw);
      max-height: 88vh;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 20px 45px rgba(0,0,0,.45);
      background: #111827;
    }
    .news-title { margin: 0 0 6px; font-size: 14px; color: #21395d; font-weight: 800; }
    .news-body { margin: 0; font-size: 13px; line-height: 1.7; color: #33465f; }
    .empty { margin: 0; font-size: 13px; color: #74859a; padding-top: 6px; }
    @media (max-width: 720px) {
      .search-page { padding: 30px 14px 18px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel search-page">
      <div class="logo-wrap">
        <img class="logo" src="../assets/starnet-logo.png" alt="StarNet logo">
      </div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="搜索用户或关键词" autocomplete="off">
        <button id="searchBtn" type="button">搜索</button>
      </div>
      <p class="search-tip">艺人新闻请使用“名字 + 关键词”进行搜索，例如：CONSTELL 演唱会。</p>
      <section class="results-wrap" id="results"></section>
    </section>
  </main>
  <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
    <img id="lightboxImage" alt="查看大图">
  </div>

  <script>
    (function () {
      var users = [
        { name: "Orion", id: "@constellorion", bio: "CONSTELL成员 Orion", href: "./artists/starnet-social-constellorion.html", avatar: "O", color: "linear-gradient(135deg,#65b6ff,#6d79ff)" },
        { name: "Rasal", id: "@constellrasal", bio: "CONSTELL成员 Rasal", href: "./artists/starnet-social-constellrasal.html", avatar: "V", color: "linear-gradient(135deg,#9a8bff,#7ac1ff)" },
        { name: "Altair", id: "@constellaltair", bio: "CONSTELL成员 Altair", href: "./artists/starnet-social-constellaltair.html", avatar: "A", color: "linear-gradient(135deg,#72d4ff,#5b8eff)" },
        { name: "Regulus", id: "@constellregulus", bio: "CONSTELL成员 Regulus", href: "./artists/starnet-social-constellregulus.html", avatar: "R", color: "linear-gradient(135deg,#ffbe75,#ff8c65)" }
      ];

      var news = [
        {
          keys: ["归辰", "五周年"],
          title: "【官方动态】《归辰》演唱会筹备进入最终阶段",
          body: "据站内同步信息，CONSTELL 五周年纪念演唱会《归辰》进入最终联排阶段。舞台视觉与曲目编排将分批释出。"
        }
      ];
      var posts = [
        {
          keys: ["风萧萧", "fxx"],
          id: "@风萧萧兮",
          body: "最近有人私信问我有没有合集，就简单列一下最近写的RO（Regulus × Orion），都在StarNet上，感兴趣可以自己翻一下。\n\n基本都是随手写的，篇幅不太固定，也没怎么修，轻拍🙏\n📄《禁区》｜短篇｜约1.8w\n📄《夜行偏差》｜短篇｜约3w\n📄《RE：O 从零开始的寰宇猎手生活》｜长篇｜23.5w\n📄《恒星失序》｜短篇｜约9k\n📄《界外》｜一发完｜约5k"
        },
        {
          keys: ["constell 演唱会", "CONSTELL 演唱会", "constell", "演唱会", "xiaojiang_tai", "我们八月见"],
          id: "@CONSTELL-Official",
          body: "我们八月见。",
          postImage: "../assets/concert-poster.png"
        },
        {
          keys: ["altair 夜店"],
          matchMode: "exact",
          id: "@Altair520",
          body: "澄清！！！网传“Altair 夜店包厢图”均为不实信息，相关夜店内图片系拼接合成。另有传言称物料里出现某品牌威士忌、电子烟，也与事实不符：画面中出现的是海外品牌的护嗓药物，所谓“电子烟”实为唇膏。请勿继续传播失实内容。"
        },
        {
          keys: ["altair 夜店"],
          matchMode: "exact",
          id: "@独家星闻",
          body: "劲爆！当红男团人气成员 Altair 被曝深夜流连夜店，更有粉丝翻出其在官方物料中疑似出现抽烟、饮酒画面，相关争议持续发酵中……更多内容请见>>>"
        },
        {
          keys: ["禁猎组"],
          id: "@头号磕糖机",
          body: "应粉丝要求，今天带来的是CONSTELL禁猎组的分析！\n如果要选一对“张力型关系”的代表，禁猎组一定在名单里。年上主舞和年下队长的配置天然带有对抗性，两个人在很多场合都呈现出一种彼此较劲的状态，这种不完全对齐的关系反而让人更容易代入。比较关键的转折点应该是那次琅婆罗洲的热带雨林之旅，据说是由Orion主导策划的行程，从那之后两人的互动明显缓和，甚至开始频繁同车出行。舞台上他们的配合也越来越成熟，性张力是肉眼可见的提升。虽然在粉圈中不算绝对主流，但禁猎组的同人创作质量一直很高，是典型的“越深入越好嗑”的类型。"
        },
        {
          keys: ["坠光组"],
          id: "@头号磕糖机",
          body: "宝子们，你们等的Regulus × Rasal CP解析来啦！\n坠光组毫无疑问是看脸绝配的一对！Regulus的冷感控制力和Rasal的清冷气质叠加在一起，很容易形成一种典型的“王道关系想象”。他们在团体初期的热度非常高，可以说为整个CP生态打下了基础。最经典的节点还是综艺拍摄时的落水事件，Rasal受伤后Regulus下水将人抱起，那一幕被站姐记录下来之后迅速出圈，成为很多人入坑的起点。近几年的舞台资源分配上，也能看出公司对这对组合的持续关注，整体是一个稳定输出、适合长期持有的CP类型。"
        },
        {
          keys: ["偏轨组"],
          id: "@头号磕糖机",
          body: "今天来谈谈CONSTELL的偏轨组吧，偏轨组的特殊性在于“长末关系”本身所带来的叙事空间。最年长和最年幼的组合，在表面互动上并不算频繁，因此常被认为关系一般，但反而因为这一点，粉丝更容易从细节处品到不一样的风味。比较典型的是生日互送有线耳机这一事件。除此之外，也有多次私下同行、用餐的目击记录。整体来看，这是一对需要“考古式观看”的CP，表面平静，但不经意的小糖点真的很多！"
        },
        {
          keys: ["巡航组"],
          id: "@头号磕糖机",
          body: "今天来分析CONSTELL的 Orion × Altair。巡航组整体更偏向“正向关系”的呈现：哥哥与弟弟的组合，再叠加RAP与主唱的功能互补，让他们在舞台合作上始终有很高的完成度，也更容易获得舞台向观众的天然好感。和其他CP相比，这对几乎没有明显的避嫌期，无论生日互动还是日常物料，都维持着相当高的开放度，肢体接触也很自然。更何况他们之间那句大家都知道的五字真言，确实很难不多想。有人会把这对归类为“兄弟情”，但从互动密度、稳定性和长期趋势来看，这段关系本身一直保留着向其他方向解读的空间。"
        },
        {
          keys: ["猎星组"],
          id: "@头号磕糖机",
          body: "来了来了！万众瞩目的CONSTELL美帝猎星组来了！连续CP总选第一的含金量不用我多说了吧？这对是一个典型的“后期爆发型”，出道初期并没有明显优势，但在第二年之后，两人在公开物料中的互动显著增加，关系的熟悉度几乎是同步增长的。私下同框、服装选择、出行轨迹等都提供了大量可供解读的素材，甚至在一定程度上突破了唯粉的接受边界。近期由于舆论环境，两人有刻意降低互动频率的趋势，但类似生日秒删这样的事件仍然会引发较大讨论，因此关于他们当前关系状态的判断，也成为粉圈持续关注的焦点。"
        },
        {
          keys: ["双星组"],
          id: "@头号磕糖机",
          body: "说到CONSTELL的双星组，是近两年增长速度非常明显的一对，去年总选已经冲到第二，今年CP粉更是摩拳擦掌想争第一！相比其他关系，这对更强调一种“互相照拂”的状态。Rasal在对外互动中常被认为态度冷淡，但在Altair面前明显更为温和，而Altair则在音乐上给予了Rasal不少支持，两人的关系呈现出一种互补且稳定的结构。随着物料曝光增加，这种相处模式逐渐被更多人接受，热度也持续上升，在最近的CP总选中已经取得了很高的排名。从整体趋势来看，是一对仍在上升期、且具有长期发展空间的组合。"
        }
      ];

      function norm(s) {
        return String(s || "").trim().toLowerCase();
      }

      function normIdLike(s) {
        return norm(s).replace(/^@+/, "").replace(/\s+/g, "");
      }

      function setupImageZoom() {
        var lightbox = document.getElementById("imageLightbox");
        var lightboxImage = document.getElementById("lightboxImage");
        var list = document.getElementById("results");
        if (!lightbox || !lightboxImage || !list) return;
        list.addEventListener("click", function (e) {
          var img = e.target && e.target.closest("img.post-image");
          if (!img) return;
          lightboxImage.src = img.currentSrc || img.src;
          lightboxImage.alt = img.alt || "查看大图";
          lightbox.classList.add("show");
          lightbox.setAttribute("aria-hidden", "false");
        });
        lightbox.addEventListener("click", function (e) {
          if (e.target !== lightbox && e.target !== lightboxImage) return;
          lightbox.classList.remove("show");
          lightboxImage.removeAttribute("src");
          lightbox.setAttribute("aria-hidden", "true");
        });
      }

      function render(query) {
        var list = document.getElementById("results");
        var q = norm(query);
        var qId = normIdLike(query);
        var userMatched = users.filter(function (u) {
          var n = norm(u.name);
          var id = normIdLike(u.id);
          return q && (n.indexOf(q) !== -1 || id.indexOf(qId) !== -1);
        });
        var newsMatched = news.filter(function (n) {
          return q && n.keys.some(function (k) { return norm(k).indexOf(q) !== -1 || q.indexOf(norm(k)) !== -1; });
        });
        var postsMatched = posts.filter(function (p) {
          if (p.matchMode === "exact") {
            return q && p.keys.some(function (k) { return norm(k) === q; });
          }
          return q && p.keys.some(function (k) { return norm(k).indexOf(q) !== -1 || q.indexOf(norm(k)) !== -1; });
        });

        var html = "";
        if (userMatched.length) {
          html += '<h2 class="section-title">用户</h2>';
          userMatched.forEach(function (u) {
            html += '<a class="card-link" href="' + u.href + '">';
            html += '<span class="avatar" style="background:' + u.color + '">' + u.avatar + "</span>";
            html += '<span><p class="name">' + u.name + '</p><p class="id">' + u.id + '</p><p class="bio">' + u.bio + "</p></span>";
            html += "</a>";
          });
        }
        if (newsMatched.length) {
          html += '<h2 class="section-title">新闻内容</h2>';
          newsMatched.forEach(function (n) {
            html += '<article class="news-card"><h3 class="news-title">' + n.title + '</h3><p class="news-body">' + n.body + "</p></article>";
          });
        }
        if (postsMatched.length) {
          html += '<h2 class="section-title">动态</h2>';
          postsMatched.forEach(function (p) {
            html += '<article class="post-card"><p class="post-head"><strong>' + p.id + '</strong> · 动态</p>';
            html += '<p class="post-body">' + p.body + "</p>";
            if (p.postImage) {
              html += '<img class="post-image" src="' + p.postImage + '" alt="动态配图">';
            }
            html += "</article>";
          });
        }
        if (q && !html) {
          html = '<p class="empty">未搜索到相关内容，请尝试成员名、ID或关键词。</p>';
        }
        list.innerHTML = html;
      }

      document.getElementById("searchBtn").addEventListener("click", function () {
        render(document.getElementById("searchInput").value);
      });
      document.getElementById("searchInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          render(e.target.value);
        }
      });

      setupImageZoom();
      render("");
    })();
  </script>
</body>
</html>
