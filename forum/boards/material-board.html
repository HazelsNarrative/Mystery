      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;

    .thread-row:first-of-type { border-radius: 12px 12px 0 0; }
    .thread-row:last-of-type { border-radius: 0 0 12px 12px; border-bottom: none; }
