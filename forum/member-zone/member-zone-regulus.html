<!DOCTYPE html>
<html lang="zh">
<head>

  <title>Regulus - 小星球宇宙基地</title>
  <style>
    :root { --text: #4e4a76; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; color: var(--text); background: radial-gradient(circle at 18% 10%, rgba(255, 212, 145, 0.62), transparent 36%), radial-gradient(circle at 84% 6%, rgba(255, 168, 191, 0.52), transparent 34%), linear-gradient(180deg, #fff7ed 0%, #fff1e8 100%); min-height: 100vh; }
    .stars::before, .stars::after { content: ""; position: fixed; inset: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(255, 255, 255, 0.9) 1px, transparent 2px); background-size: 160px 160px; opacity: 0.35; }
    .wrap { position: relative; z-index: 1; width: min(760px, 92vw); margin: 0 auto; padding: 24px 0 40px; }
    .nav-back { display: inline-block; margin-bottom: 12px; color: #a35f3b; text-decoration: none; font-size: 13px; font-weight: 600; }
    .nav-back:hover { text-decoration: underline; }
    .guest-readonly-note { margin: 0 0 12px; padding: 9px 12px; border-radius: 10px; border: 1px solid rgba(226, 183, 142, 0.42); background: rgba(255, 255, 255, 0.78); color: #7f5f49; font-size: 12px; line-height: 1.6; font-weight: 600; }
    .hero { border-radius: 20px; border: 2px solid rgba(226, 183, 142, 0.52); overflow: hidden; box-shadow: 0 14px 34px rgba(150, 106, 70, 0.16); background: rgba(255, 255, 255, 0.86); margin-bottom: 14px; }
    .hero-top { padding: 22px 20px 18px; background: linear-gradient(120deg, rgba(255,255,255,0.85), rgba(255,255,255,0.48)); border-bottom: 1px solid rgba(226, 183, 142, 0.3); }
    .kicker { margin: 0 0 6px; font-size: 11px; letter-spacing: 0.1em; font-weight: 800; color: #c6713c; }
    h1 { margin: 0; font-size: 30px; line-height: 1.2; color: #66442f; }
    .sub { margin: 8px 0 0; font-size: 13px; color: #7f5f49; font-weight: 600; }
    .body { padding: 18px 20px 22px; }
    .body p { margin: 0; color: #6a4f3f; line-height: 1.85; font-size: 14px; }
    .thread-list-card { border-radius: 18px; border: 2px solid rgba(226, 183, 142, 0.52); background: rgba(255, 255, 255, 0.86); box-shadow: 0 14px 34px rgba(150, 106, 70, 0.16); overflow: hidden; }
    .thread-list-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid rgba(226, 183, 142, 0.3); font-size: 12px; color: #7f5f49; font-weight: 700; letter-spacing: 0.06em; }
    .thread-row { display: block; text-decoration: none; color: inherit; padding: 14px; background: rgba(255,255,255,0.72); }
    .pin-tag { display: inline-block; margin-right: 8px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 800; color: #fff; background: linear-gradient(90deg, #d78952, #ec9d72); vertical-align: middle; }
    .thread-row h2 { margin: 0 0 8px; font-size: 16px; line-height: 1.5; color: #66442f; }
    .thread-row .meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: #8b725f; font-weight: 600; }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <main class="wrap">
    <a class="nav-back" href="../asterbase.html">← 返回小星球宇宙基地</a>

    <section class="hero">

      </div>
    </section>
    <section class="thread-list-card">
      <div class="thread-list-head">
        <span>主题列表</span>
        <span>LATEST</span>
      </div>
      <a class="thread-row" href="./member-zone-regulus-thread-profile.html">

        <div class="meta">
          <span>楼主：小星球1042</span>

          <span>浏览 14.7w+</span>
        </div>

    </section>
  </main>
  <script>
    (function () {
      if (sessionStorage.getItem("lp_forum_mode") !== "guest") {
        return;
      }
      var tip = document.getElementById("guestReadonlyNote");
      if (tip) {
        tip.hidden = false;
      }
    })();
  </script>
</body>
</html>
