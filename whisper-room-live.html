<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Room 私聊窗口</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #141a2a;
      --panel-soft: #1a2235;
      --line: #2a3550;
      --text: #deebff;
      --muted: #9caed2;
      --accent: #7ea7ff;
      --accent-2: #a889ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% -10%, rgba(126, 167, 255, 0.2), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(168, 137, 255, 0.16), transparent 30%),
        var(--bg);
    }
    .app {
      width: min(1040px, 94vw);
      margin: 22px auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 46px rgba(6, 9, 18, 0.6);
      background: linear-gradient(180deg, #11182a, var(--panel));
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .topbar .brand { color: #f2f6ff; font-weight: 700; letter-spacing: 0.04em; }
    .main { display: flex; flex-direction: column; min-height: 72vh; }
    .chat-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      font-size: 13px;
      color: #d4e1ff;
    }
    .messages {
      flex: 1;
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      border: 1px solid #30405f;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.65;
      color: #dce8ff;
      max-width: min(78%, 620px);
      align-self: flex-start;
    }
    .msg .meta { display: block; margin: 0 0 3px; font-size: 12px; color: #a7b8db; }
    .msg.sys {
      border-color: #5872ac;
      background: rgba(126, 167, 255, 0.14);
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: flex;
      gap: 8px;
      background: #0f1628;
    }
    .composer input {
      flex: 1;
      min-width: 0;
      border: 1px solid #3b4b6e;
      background: #141f35;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .composer input:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      pointer-events: none;
    }
    .composer button {
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      color: #0a1330;
      font-weight: 700;
      font-size: 13px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }
    .msg.me {
      border-color: #5576b4;
      background: linear-gradient(180deg, #28457a, #243d6c);
      align-self: flex-end;
      text-align: left;
    }
    .msg.me .meta { display: none; }
    .msg.typing {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      max-width: none;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -2px;
    }
    .msg.typing .meta { display: none; }
    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #30405f;
      background: rgba(126, 167, 255, 0.1);
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a7b8db;
      opacity: 0.35;
      animation: typingPulse 1.1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingPulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-2px); opacity: 0.95; }
    }
    .choice-list {
      display: none;
      border-top: 1px solid var(--line);
      background: #0f172b;
      padding: 12px 10px 10px;
      gap: 8px;
      flex-direction: column;
    }
    .choice-list.show { display: flex; }
    .choice-btn {
      border: 1px solid #516a9a;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #e6efff;
      background: linear-gradient(180deg, #1b2a49, #17233d);
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      width: 100%;
      box-shadow: 0 6px 14px rgba(8, 13, 24, 0.28);
    }
    .choice-btn:hover { background: linear-gradient(180deg, #23355c, #1e2f52); border-color: #6e88be; }
    .choice-btn.image-choice {
      padding: 6px;
      background: #141f35;
      border-color: #4a6393;
      width: 130px;
    }
    .choice-btn.image-choice img {
      width: 100%;
      display: block;
      border-radius: 8px;
      border: 1px solid #3e557f;
    }
    .msg-image {
      margin-top: 8px;
      width: 220px;
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #465a81;
      display: block;
      user-select: none;
    }
    .msg-image-clickable {
      width: 118px;
      cursor: zoom-in;
    }
    .msg-image-locked {
      pointer-events: none;
      cursor: default;
      filter: saturate(0.9);
    }
    .msg-link {
      color: #9fc2ff;
      text-decoration: none;
      word-break: break-all;
    }
    .msg-link:hover { text-decoration: underline; }
    .image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(12, 16, 28, 0.82);
      z-index: 260;
      padding: 24px;
    }
    .image-lightbox.show { display: flex; }
    .image-lightbox img {
      max-width: min(1100px, 92vw);
      max-height: 88vh;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 20px 45px rgba(0,0,0,.45);
      background: #111827;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <span class="brand">Whisper Room</span>
      <span>加密私聊</span>
      <span>@con_s_tell</span>
    </div>
      <section class="main">
        <div class="chat-head">与 @con_s_tell 的私聊窗口</div>
        <div class="messages" id="messages">
          <div class="msg sys"><span class="meta">System</span>端到端加密已启用，仅你和对方可见。</div>
        </div>
        <div class="choice-list" id="choiceList"></div>
        <div class="composer" id="composer">
          <input id="input" type="text" readonly placeholder="">
        </div>
      </section>
  </main>
  <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
    <img id="lightboxImage" alt="查看大图">
  </div>
  <script>
    (function () {
      var input = document.getElementById("input");
      var messages = document.getElementById("messages");
      var choiceList = document.getElementById("choiceList");
      var lightbox = document.getElementById("imageLightbox");
      var lightboxImage = document.getElementById("lightboxImage");
      var state = "first-choice";
      var locked = false;
      var firstIntent = "";

      var firstChoices = ["CONSTELL成员小号", "“黑洞”邀请链接", "真正的秘密"];
      var secondChoices = ["什么都没有", "钱？", "CONSTELL的非卖品周边"];

      function addMsg(text, who, cls) {
        var row = document.createElement("div");
        row.className = "msg" + (cls ? " " + cls : "");
        row.innerHTML = '<span class="meta">' + who + "</span>" + text;
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
        return row;
      }

      function botReply(text, cb, extraDelayMs) {
        var typing = addMsg('<span class="typing-dots"><span></span><span></span><span></span></span>', "@con_s_tell", "typing");
        setTimeout(function () {
          typing.remove();
          addMsg(text, "@con_s_tell");
          if (cb) cb();
        }, 1800 + Math.floor(Math.random() * 1800) + (extraDelayMs || 0));
      }

      function polishedSendText(rawChoice) {
        var map = {
          "CONSTELL成员小号": "你知道CONSTELL成员的小号吗？",
          "“黑洞”邀请链接": "我想要“黑洞”的邀请链接，你这边有吗？",
          "真正的秘密": "……真正的秘密？",
          "什么都没有": "嗯……我现在什么也没有……",
          "钱？": "钱可以谈，你开价。",
          "CONSTELL的非卖品周边": "我有CONSTELL的非卖品周边，可以换。",
          "【图片】CONSTELL非卖品周边": "",
          "寄给你了": "已经寄给你了。"
        };
        return map[rawChoice] || rawChoice;
      }

      function showChoices(list, onChoose) {
        choiceList.innerHTML = "";
        list.forEach(function (t) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choice-btn";
          if (t && typeof t === "object" && t.type === "image" && t.key === "non_sale_merch") {
            btn.classList.add("image-choice");
            btn.innerHTML = '<img src="./assets/starnet-non-sale-merch.png" alt="非卖品周边">';
          } else {
            btn.textContent = t;
          }
          btn.addEventListener("click", function () {
            if (locked) return;
            choiceList.classList.remove("show");
            var polished = typeof t === "string" ? polishedSendText(t) : "";
            if (typeof polished === "string" && polished) {
              addMsg(polished, "", "me");
            }
            onChoose(t);
          });
          choiceList.appendChild(btn);
        });
        choiceList.classList.add("show");
      }

      function leaveRoom() {
        locked = true;
        choiceList.classList.remove("show");
        input.disabled = true;
        addMsg("对方已离开聊天室。连接已中断。", "System", "sys");
      }

      function handleFirstChoice() {
        showChoices(firstChoices, function (picked) {
          if (picked === "CONSTELL成员小号") firstIntent = "small";
          else if (picked === "真正的秘密") firstIntent = "secret";
          else firstIntent = "blackhole";
          state = "second-choice";
          botReply("你有什么");
        });
      }

      function handleSecondChoice() {
        showChoices(secondChoices, function (picked) {
          if (picked === "什么都没有") {
            botReply("滚", leaveRoom);
            return;
          }
          if (picked === "钱？") {
            botReply("没意思", leaveRoom);
            return;
          }
          state = "send-image";
          botReply("哦？什么周边？");
        });
      }

      function handleSendImage() {
        showChoices([{ type: "image", key: "non_sale_merch" }], function () {
          addMsg('<img class="msg-image msg-image-clickable zoomable" src="./assets/starnet-non-sale-merch.png" alt="非卖品周边">', "你", "me");
          state = "send-confirm";
          botReply("这是我的地址<br>IMG_84721639.jpg（1.8MB）");
        });
      }

      function handleConfirm() {
        showChoices(["寄给你了"], function () {
          var afterLink = function () {
            botReply("下次有东西再来找我", function () {
              leaveRoom();
            }, 400);
          };
          var sendLink = function () {
            botReply('<a class="msg-link" href="./blackhole-invite-q7m9k2.html" target="_blank" rel="noopener noreferrer">blackhole-invite-q7m9k2.html</a>', afterLink);
          };
          if (firstIntent === "small" || firstIntent === "secret") {
            botReply("这些东西，我只能给你“黑洞”链接", sendLink, 1200);
          } else {
            sendLink();
          }
          state = "done";
        });
      }

      input.addEventListener("click", function () {
        if (locked) return;
        if (state === "first-choice") return handleFirstChoice();
        if (state === "second-choice") return handleSecondChoice();
        if (state === "send-image") return handleSendImage();
        if (state === "send-confirm") return handleConfirm();
      });

      messages.addEventListener("click", function (e) {
        var img = e.target && e.target.closest("img.zoomable");
        if (!img || !lightbox || !lightboxImage) return;
        lightboxImage.src = img.currentSrc || img.src;
        lightboxImage.alt = img.alt || "查看大图";
        lightbox.classList.add("show");
        lightbox.setAttribute("aria-hidden", "false");
      });
      if (lightbox && lightboxImage) {
        lightbox.addEventListener("click", function (e) {
          if (e.target !== lightbox && e.target !== lightboxImage) return;
          lightbox.classList.remove("show");
          lightboxImage.removeAttribute("src");
          lightbox.setAttribute("aria-hidden", "true");
        });
      }

      botReply("要买什么");
    })();
  </script>
</body>
</html>
