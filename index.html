<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
    }

    /* 顶部栏 */
    .header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    /* 邮箱容器 */
    .container {
      display: flex;
    }

    /* 左侧菜单 */
    .sidebar {
      width: 200px;
      background: #ecf0f1;
      height: 100vh;
      padding: 10px;
    }

    .sidebar div {
      padding: 10px;
      cursor: pointer;
    }

    .sidebar div:hover {
      background: #dcdde1;
    }

    /* 邮件列表 */
    .mail-list {
      flex: 1;
      padding: 20px;
    }

    .mail-item {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .mail-item:hover {
      background: #f0f0f0;
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    .modal button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }

    .modal button:hover {
      background: #34495e;
    }

    .mail-detail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .mail-detail-content {
      background: white;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: auto;
      border-radius: 10px;
      padding: 24px;
      line-height: 1.7;
      color: #2c3e50;
    }

    .mail-detail-content h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .mail-detail-content p {
      margin: 0 0 12px;
    }

    .mail-detail-content a {
      color: #1d6fd6;
      text-decoration: none;
      font-weight: 600;
    }

    .mail-detail-content a:hover {
      text-decoration: underline;
    }

    .close-btn {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }

    .close-btn:hover {
      background: #34495e;
    }
  </style>
</head>
<body>
  <!-- 顶部 -->
  <div class="header">我的邮箱</div>

  <div class="container">
    <!-- 左侧 -->
    <div class="sidebar">
      <div>📥 收件箱</div>
      <div>📤 已发送</div>
      <div>🗑 垃圾箱</div>
    </div>

    <!-- 邮件列表 -->
    <div class="mail-list" id="mailList">
      <!-- 邮件会通过JS生成 -->
    </div>
  </div>

  <!-- 弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <p>你是一个侦探，今天你接到了来自某知名娱乐公司的委托</p>
      <button onclick="startGame()">开始游戏</button>
    </div>
  </div>

  <div class="mail-detail" id="mailDetail">
    <div class="mail-detail-content">
      <h2>紧急委托</h2>
      <p>我们公司的当家男团 CONSTELL 在筹备演唱会期间突然失联。演出在即，事态紧急，请你尽快介入调查并确认成员去向。</p>
      <p>建议你先去粉丝论坛看看，那里可能已经有一些零散但关键的情报。</p>
      <p>落款：星河文娱集团</p>
      <p>联系电话：138-xxx-7621</p>
      <p>
        官网：
        <a href="./constell-official.html" title="本仓库官网页">https://www.constell-official.com/</a>
      </p>
      <button class="close-btn" onclick="closeMailDetail()">关闭</button>
    </div>
  </div>

  <script>
    function startGame() {
      document.getElementById("modal").style.display = "none";

      // 添加一封邮件
      const mailList = document.getElementById("mailList");
      const mail = document.createElement("div");
      mail.className = "mail-item";
      mail.innerHTML = "<strong>来自：某娱乐公司</strong><br>主题：紧急委托";

      mail.onclick = function() {
        openMailDetail();
      };

      mailList.appendChild(mail);
    }

    function openMailDetail() {
      document.getElementById("mailDetail").style.display = "flex";
    }

    function closeMailDetail() {
      document.getElementById("mailDetail").style.display = "none";
    }
  </script>
</body>
</html>
