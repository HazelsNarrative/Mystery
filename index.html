<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>当红男团集体失踪事件</title>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: #1f2a3a;
      background:
        radial-gradient(circle at 18% 10%, rgba(190, 168, 255, 0.34), transparent 36%),
        radial-gradient(circle at 80% 0%, rgba(132, 195, 255, 0.28), transparent 34%),
        #f4f7fd;
      min-height: 100vh;
    }
    .wrap { min-height: 100vh; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: left;
      width: 300px;
    }
    .modal button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }
    .modal button:hover { background: #34495e; }
  </style>
</head>
<body>
  <main class="wrap"></main>

  <div class="modal" id="modal">
    <div class="modal-content">
      <p>你已经一周没有联系上你的哥哥了。</p>
      <p>他是当红男团CONSTELL的经纪人，一直都很忙，你们平时联系并不算频繁。</p>
      <p>但这一次不太一样。</p>
      <p>这一周里，你试过打电话、发消息，都没有任何回应。</p>
      <p>你开始意识到，这可能不是单纯的忙碌。</p>
      <p>你只能回头去翻你们之前的邮件记录，试图从中找到一些线索。</p>
      <button onclick="startGame()">开始调查</button>
    </div>
  </div>

  <script>
    function startGame() {
      window.open("./mailbox.html", "_blank");
    }
  </script>
</body>
</html>
