<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的邮箱</title>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f3f6fb;
      color: #203048;
    }
    .header {
      background: linear-gradient(90deg, #2c3e50, #314b66);
      color: white;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(22, 40, 66, 0.2);
    }
    .container {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      background: #ecf2fa;
      padding: 10px 8px;
      border-right: 1px solid #dce6f2;
    }
    .sidebar div {
      padding: 8px 10px;
      border-radius: 10px;
      cursor: default;
      font-weight: 600;
      font-size: 13px;
      color: #3d4f69;
      margin-bottom: 6px;
    }
    .sidebar div:first-child {
      background: #dde9fb;
      color: #2a4370;
    }
    .mail-list { padding: 22px 24px; }
    .mail-item {
      background: white;
      padding: 16px 18px;
      margin-bottom: 10px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #dce4f0;
      box-shadow: 0 4px 12px rgba(41, 69, 106, 0.08);
    }
    .mail-item:hover {
      background: #f8fbff;
      border-color: #cddaf0;
    }
    .mail-detail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .mail-detail-content {
      background: white;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: auto;
      border-radius: 12px;
      padding: 24px;
      line-height: 1.7;
      color: #2c3e50;
    }
    .mail-detail-content h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .mail-detail-content p {
      margin: 0 0 12px;
    }
    .mail-detail-content a {
      color: #1d6fd6;
      text-decoration: none;
      font-weight: 600;
    }
    .mail-detail-content a:hover { text-decoration: underline; }
    .close-btn {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }
    .close-btn:hover { background: #34495e; }
  </style>
</head>
<body>
  <div class="header">我的邮箱</div>
  <div class="container">
    <div class="sidebar">
      <div>📥 收件箱</div>
      <div>📤 已发送</div>
      <div>🗑 垃圾箱</div>
    </div>
    <div class="mail-list" id="mailList"></div>
  </div>

  <div class="mail-detail" id="mailDetail">
    <div class="mail-detail-content">
      <h2>紧急委托</h2>
      <p>我们公司的当家男团 CONSTELL 在筹备演唱会期间突然失联。演出在即，事态紧急，请你尽快介入调查并确认成员去向。</p>
      <p>建议你先去粉丝论坛看看，那里可能已经有一些零散但关键的情报。</p>
      <p>落款：星河文娱集团</p>
      <p>联系电话：138-xxx-7621</p>
      <p>
        官网：
        <a href="./site/constell-official.html" title="本仓库官网页">https://www.constell-official.com/</a>
      </p>
      <button class="close-btn" onclick="closeMailDetail()">关闭</button>
    </div>
  </div>

  <script>
    (function initMail() {
      var mailList = document.getElementById("mailList");
      var mail = document.createElement("div");
      mail.className = "mail-item";
      mail.innerHTML = "<strong>来自：某娱乐公司</strong><br>主题：紧急委托";
      mail.onclick = function () {
        openMailDetail();
      };
      mailList.appendChild(mail);
    })();

    function openMailDetail() {
      document.getElementById("mailDetail").style.display = "flex";
    }

    function closeMailDetail() {
      document.getElementById("mailDetail").style.display = "none";
    }
  </script>
</body>
</html>
