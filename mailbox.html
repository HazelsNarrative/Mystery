<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的邮箱</title>
  <style>
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f3f6fb;
      color: #203048;
    }
    .header {
      background: linear-gradient(90deg, #2c3e50, #314b66);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 6px 18px rgba(22, 40, 66, 0.2);
    }
    .header-title { font-size: 20px; font-weight: 700; }
    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .logout-btn:hover { background: rgba(255, 255, 255, 0.2); }
    .container {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      background: #ecf2fa;
      padding: 10px 8px;
      border-right: 1px solid #dce6f2;
    }
    .sidebar .folder-item {
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: #3d4f69;
      margin-bottom: 6px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .sidebar .folder-item.active {
      background: #dde9fb;
      color: #2a4370;
    }
    .sidebar .folder-item:hover {
      background: #e5eefc;
    }
    .mail-list { padding: 22px 24px; }
    .mail-item {
      background: white;
      padding: 16px 18px;
      margin-bottom: 10px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #dce4f0;
      box-shadow: 0 4px 12px rgba(41, 69, 106, 0.08);
    }
    .mail-from {
      margin: 0 0 6px;
      font-size: 13px;
      color: #516580;
    }
    .mail-subject {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 700;
      color: #2a4066;
    }
    .mail-time {
      margin: 0;
      font-size: 12px;
      color: #7b8ca5;
    }
    .mail-item:hover {
      background: #f8fbff;
      border-color: #cddaf0;
    }
    .mail-detail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .mail-detail-content {
      background: white;
      width: min(560px, 92vw);
      max-height: 80vh;
      overflow: auto;
      border-radius: 12px;
      padding: 24px;
      line-height: 1.7;
      color: #2c3e50;
    }
    .mail-detail-content h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    .mail-detail-content p {
      margin: 0 0 12px;
    }
    .mail-detail-content a {
      color: #1d6fd6;
      text-decoration: none;
      font-weight: 600;
    }
    .mail-detail-content a:hover { text-decoration: underline; }
    .close-btn {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: white;
      cursor: pointer;
    }
    .close-btn:hover { background: #34495e; }

    .verify-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(35, 54, 86, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .verify-modal.show {
      display: flex;
    }
    .verify-card {
      width: min(460px, 94vw);
      background: linear-gradient(180deg, #fffdf9, #f6fbff);
      border: 1px solid #dbe8f4;
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(44, 77, 118, 0.2);
      padding: 18px 16px;
    }
    .verify-card h3 {
      margin: 0 0 8px;
      color: #38516f;
      font-size: 18px;
    }
    .verify-card p {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.7;
      color: #58708c;
    }
    .verify-field {
      margin-bottom: 10px;
    }
    .verify-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #4d6784;
    }
    .verify-field input {
      width: 100%;
      border: 1px solid #cfdeef;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      color: #243b56;
      box-sizing: border-box;
      font-family: inherit;
      background: #fff;
    }
    .verify-error {
      min-height: 1.2em;
      margin: 4px 0 0;
      font-size: 12px;
      color: #cf496e;
    }
    .verify-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .verify-actions button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .verify-cancel {
      background: #edf2fa;
      color: #5b6f86;
    }
    .verify-ok {
      background: linear-gradient(90deg, #8fb8e6, #7aa6d9);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">我的邮箱</div>
    <button class="logout-btn" type="button" onclick="logoutMailbox()">登出</button>
  </div>
  <div class="container">
    <div class="sidebar">
      <div class="folder-item active" data-folder="inbox">📥 收件箱</div>
      <div class="folder-item" data-folder="sent">📤 已发送</div>
      <div class="folder-item" data-folder="trash">🗑 垃圾箱</div>
    </div>
    <div class="mail-list" id="mailList"></div>
  </div>

  <div class="mail-detail" id="mailDetail">
    <div class="mail-detail-content">
      <h2 id="detailSubject">邮件标题</h2>
      <p id="detailFrom"></p>
      <p id="detailDate"></p>
      <div id="detailBody"></div>
      <button class="close-btn" onclick="closeMailDetail()">关闭</button>
    </div>
  </div>

  <div class="verify-modal" id="externalVerifyModal" aria-hidden="true">
    <div class="verify-card">
      <h3>疗养院 · 外网访问认证</h3>
      <p>检测到你当前使用的是院内网络。根据安全策略，访问外部站点前需要先完成一次身份认证。</p>
      <div class="verify-field">
        <label for="verifyNickname">昵称</label>
        <input id="verifyNickname" type="text" maxlength="8" placeholder="4-8位小写字母">
      </div>
      <div class="verify-field">
        <label for="verifyBirthday">生日（MMDD）</label>
        <input id="verifyBirthday" type="text" inputmode="numeric" maxlength="4" placeholder="MMDD四位数字">
      </div>
      <p class="verify-error" id="verifyError"></p>
      <div class="verify-actions">
        <button type="button" class="verify-cancel" id="verifyCancelBtn">稍后再说</button>
        <button type="button" class="verify-ok" id="verifySubmitBtn">确认并访问</button>
      </div>
    </div>
  </div>

  <script>
    (function initMail() {
      var EXTERNAL_AUTH_KEY = "qianan_external_auth_v1";
      var EXTERNAL_NICK_KEY = "qianan_external_nickname";
      var EXTERNAL_BIRTHDAY_KEY = "qianan_external_birthday";
      var EXTERNAL_MAIL_ADDED_KEY = "qianan_external_mail_added_v1";
      var mailList = document.getElementById("mailList");
      var folderItems = document.querySelectorAll(".folder-item");
      var verifyModal = document.getElementById("externalVerifyModal");
      var verifyNicknameInput = document.getElementById("verifyNickname");
      var verifyBirthdayInput = document.getElementById("verifyBirthday");
      var verifyError = document.getElementById("verifyError");
      var verifyCancelBtn = document.getElementById("verifyCancelBtn");
      var verifySubmitBtn = document.getElementById("verifySubmitBtn");
      var pendingExternalUrl = "";
      var activeFolder = "inbox";
      var mails = [
        {
          from: "哥哥",
          date: "10 天前",
          subject: "最近太忙了，等演唱会结束带你去玩",
          body: [
            "对不起呀，最近真的太忙了，这段时间我几乎都在陪着他们筹备演唱会。",
            "不过你放心，等演唱会圆满结束就能稍微休息一阵子了。",
            "到时候哥哥一定带你出去玩，你想去哪里都可以，我们慢慢挑。"
          ]
        },
        {
          from: "哥哥",
          date: "2 周前",
          subject: "给你寄了点东西，记得看看",
          body: [
            "最近发奖金了，又可以给你花钱啦，哈哈。",
            "他们知道我的情况之后，其实都挺照顾我的，人也都很好。这次出的新周边，我也一起放在里面寄给你了，你穿穿看？质量还挺好的，平时大家都会穿。",
            "我还给你在“启岸心理”约了一个阶段的咨询疗程，听说那边口碑特别好、咨询师也很靠谱，你先去试试，不合适我们再换。",
            "小小抱怨一下，最近工作好累啊啊啊，哎，这个圈子真的……很复杂，麻烦事也很多，不过哥哥都会想办法处理好的，你不用担心。",
            "也不知道这样说能不能让你安心一点，但不管发生什么，哥哥都会在你这边的。",
            "要天天开心啦！"
          ]
        },
        {
          from: "哥哥",
          date: "更早",
          subject: "刚才那封发错账号了",
          body: [
            "抱歉，切错邮箱账号了，因为两个账号密码是一样的，一下没注意就弄混了，以后要改一下。",
            "刚才那封你别多想，我只是想把话说清楚一点。",
            "你也别总是自己闷着，有什么就说出来，开心一点，比什么都重要。",
            "还有，CONSTELL这次演唱会真的会很精彩，你可以期待一下。"
          ]
        },
        {
          from: "constell.manager@stargalaxy-ent.com",
          date: "更早",
          subject: "前几天的事，对不起",
          body: [
            "你是不是还在生气。",
            "前几天那件事，是哥哥说得太重了。对不起。",
            "你也知道我这段时间一直很忙，有时候顾不上你的感受，但那不是理由。你不高兴，是应该的。",
            "不管发生什么，你都不用一个人扛。哥哥一直都会在你这边。",
            "这些话当面说可能会更好一点，但我最近确实走不开，只能先这样跟你说。",
            "另外，下个月CONSTELL演唱会首场我已经给你留好门票了。当天我会很忙，会安排人去接你，你不用担心。",
            "等这阵子结束，我们再好好聊，好吗。",
            "",
            "——",
            "CONSTELL 经纪人",
            "星河文娱集团｜艺人管理中心",
            "",
            "邮箱：constell.manager@stargalaxy-ent.com",
            "官网：<a href=\"./site/constell-official.html\" target=\"_blank\" rel=\"noopener noreferrer\" title=\"本仓库官网页\">https://www.constell-official.com/</a>"
          ]
        }
      ];

      var folders = {
        inbox: mails,
        sent: [],
        trash: []
      };

      function hasExternalAccess() {
        return localStorage.getItem(EXTERNAL_AUTH_KEY) === "1";
      }

      function isValidNickname(v) {
        return /^[a-z]{4,8}$/.test(String(v || "").trim());
      }

      function isValidBirthday(v) {
        var s = String(v || "").trim();
        if (!/^\d{4}$/.test(s)) return false;
        var month = Number(s.slice(0, 2));
        var day = Number(s.slice(2, 4));
        if (month < 1 || month > 12) return false;
        var monthDays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        return day >= 1 && day <= monthDays[month - 1];
      }

      function addRehabCredentialMail(nickname, birthday) {
        var exists = localStorage.getItem(EXTERNAL_MAIL_ADDED_KEY) === "1";
        if (exists) return;
        folders.inbox.unshift({
          from: "疗养院 · 网络服务中心",
          date: "刚刚",
          subject: "外网认证信息回执（请妥善保存）",
          body: [
            "你好，已完成院内网络外网访问认证。",
            "以下为你本次提交的信息回执：",
            "账号（昵称）：" + nickname,
            "认证口令（生日）：" + birthday,
            "如需再次访问外网站点，请使用以上信息进行身份确认。"
          ]
        });
        localStorage.setItem(EXTERNAL_MAIL_ADDED_KEY, "1");
      }

      function openVerifyModal(targetUrl) {
        pendingExternalUrl = String(targetUrl || "");
        verifyError.textContent = "";
        verifyNicknameInput.value = localStorage.getItem(EXTERNAL_NICK_KEY) || "";
        verifyBirthdayInput.value = localStorage.getItem(EXTERNAL_BIRTHDAY_KEY) || "";
        verifyModal.classList.add("show");
        verifyModal.setAttribute("aria-hidden", "false");
        verifyNicknameInput.focus();
      }

      function closeVerifyModal() {
        verifyModal.classList.remove("show");
        verifyModal.setAttribute("aria-hidden", "true");
        pendingExternalUrl = "";
      }

      function completeVerifyAndOpen() {
        var nickname = String(verifyNicknameInput.value || "").trim();
        var birthday = String(verifyBirthdayInput.value || "").trim();
        if (!isValidNickname(nickname)) {
          verifyError.textContent = "昵称格式错误：需为 4-8 位小写字母。";
          return;
        }
        if (!isValidBirthday(birthday)) {
          verifyError.textContent = "生日格式错误：请输入有效 MMDD 日期（如 0101）。";
          return;
        }
        localStorage.setItem(EXTERNAL_AUTH_KEY, "1");
        localStorage.setItem(EXTERNAL_NICK_KEY, nickname);
        localStorage.setItem(EXTERNAL_BIRTHDAY_KEY, birthday);
        addRehabCredentialMail(nickname, birthday);
        renderMailList(activeFolder);
        var url = pendingExternalUrl;
        closeVerifyModal();
        if (url) window.open(url, "_blank");
      }

      function requestExternalAccess(url) {
        if (hasExternalAccess()) {
          window.open(url, "_blank");
          return;
        }
        openVerifyModal(url);
      }

      function renderMailList(folderKey) {
        activeFolder = folderKey;
        var list = folders[folderKey] || [];
        mailList.innerHTML = "";

        if (!list.length) {
          return;
        }

        list.forEach(function (item) {
          var mail = document.createElement("div");
          mail.className = "mail-item";
          mail.innerHTML =
            '<p class="mail-from">来自：' + item.from + '</p>' +
            '<p class="mail-subject">主题：' + item.subject + '</p>' +
            '<p class="mail-time">' + item.date + "</p>";
          mail.onclick = function () {
            openMailDetail(item);
          };
          mailList.appendChild(mail);
        });
      }

      function setActiveFolder(folderKey) {
        folderItems.forEach(function (el) {
          if (el.dataset.folder === folderKey) {
            el.classList.add("active");
          } else {
            el.classList.remove("active");
          }
        });
        renderMailList(folderKey);
      }

      folderItems.forEach(function (item) {
        item.addEventListener("click", function () {
          setActiveFolder(item.dataset.folder);
        });
      });

      setActiveFolder("inbox");
      window.requestExternalAccess = requestExternalAccess;
      window.completeVerifyAndOpen = completeVerifyAndOpen;
      window.closeExternalVerifyModal = closeVerifyModal;
    })();

    function openMailDetail(mail) {
      document.getElementById("detailSubject").textContent = mail.subject;
      document.getElementById("detailFrom").textContent = "来自：" + mail.from;
      document.getElementById("detailDate").textContent = "时间：" + mail.date;
      document.getElementById("detailBody").innerHTML = mail.body
        .map(function (line) { return "<p>" + line + "</p>"; })
        .join("");
      Array.prototype.forEach.call(document.querySelectorAll("#detailBody a"), function (a) {
        var href = a.getAttribute("href") || "";
        if (
          href.indexOf("constell-official.com") >= 0 ||
          href.indexOf("./site/constell-official.html") >= 0
        ) {
          a.addEventListener("click", function (e) {
            e.preventDefault();
            requestExternalAccess(href);
          });
        }
      });
      document.getElementById("mailDetail").style.display = "flex";
    }

    function closeMailDetail() {
      document.getElementById("mailDetail").style.display = "none";
    }

    function logoutMailbox() {
      window.location.href = "./mailbox-login.html";
    }

    document.getElementById("verifyCancelBtn").addEventListener("click", function () {
      if (window.closeExternalVerifyModal) window.closeExternalVerifyModal();
    });
    document.getElementById("verifySubmitBtn").addEventListener("click", function () {
      if (window.completeVerifyAndOpen) window.completeVerifyAndOpen();
    });
    document.getElementById("externalVerifyModal").addEventListener("click", function (e) {
      if (e.target === this) {
        if (window.closeExternalVerifyModal) window.closeExternalVerifyModal();
      }
    });
  </script>
</body>
</html>
